<!DOCTYPE html>
<html>
<head>
    
    <title>BurnUI</title>
    
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        
        .top {
            background-color: red;
            border-bottom-right-radius: 50px;
            border-top-right-radius: 50px;
            border: 5px solid yellow;
            align-items: center;
            display: flex;
            margin: 35px;
        }
        
        .button {
            background-color: orangered;
            color: yellow;
            border: 5px solid yellow;
            border-radius: 12px;
        }
        
        .button:hover {
            cursor: pointer;
            background-color: yellow;
            color: orangered;
            border: 5px solid orangered;
            border-radius: 12px;
        }

        .game-btn {
            background-color: orangered;
            color: yellow;
            border: 4px solid yellow;
            border-radius: 10px;
            padding: 10px;
            margin: 10px 0;
            width: 250px;
            font-weight: bold;
            cursor: pointer;
            display: block;
        }

        .game-btn:hover {
            background-color: yellow;
            color: orangered;
            border-color: orangered;
        }

        iframe {
            width: 100%;
            height: 500px;
            background: white;
            border: 4px solid yellow;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }
    </style>
    
</head>
<body style="background-image: linear-gradient(to bottom, orange, red); background-repeat: no-repeat; height: 100%; background-size: cover;">
    
    <div class="top">
        <h1 style="font-size: 50px; font-family: Arial, Helvetica, sans-serif;">BurnUI</h1>
        <p style="color: red" id="DIVIDER">====</p>
        <a href="Profile.html"><button style="height: 50px;" class="button">Profile</button></a>
    </div>

    <div style="padding: 20px;">
        <h2 style="color: yellow;">Publish a Game</h2>
        <input id="urlInput" placeholder="Paste game URL here" style="width: 80%; padding: 10px; border-radius: 10px; border: 3px solid yellow;">
        <button class="button" style="padding: 10px;" onclick="publishGame()">Publish</button>

        <h2 style="color: yellow; margin-top: 40px;">Published Games</h2>
        <div id="publishedList"></div>

        <iframe id="preview"></iframe>
    </div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js"></script>

    <script>

	// -----------------------------
// Firebase Setup
// -----------------------------
const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    databaseURL: "YOUR_DB_URL",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_BUCKET",
    messagingSenderId: "YOUR_SENDER",
    appId: "YOUR_APP_ID"
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.database();

        function publishGame() {
    let url = urlInput.value.trim();

    if (!url.includes("?game=")) {
        alert("Invalid URL");
        return;
    }

    let encoded = url.split("?game=")[1];

    let id = "game_" + Date.now();

    // Save to Firebase instead of localStorage
    db.ref("publishedGames/" + id).set({
        code: encoded,
        timestamp: Date.now()
    });

    alert("Game published online!");
}

        function loadPublishedGames() {
    let list = document.getElementById("publishedList");
    list.innerHTML = "";

    db.ref("publishedGames").on("value", snapshot => {
        list.innerHTML = "";

        let games = snapshot.val();
        if (!games) return;

        for (let id in games) {
            let btn = document.createElement("button");
            btn.className = "game-btn";
            btn.textContent = "Game " + id.replace("game_", "");
            btn.onclick = () => loadGame(id);
            list.appendChild(btn);
        }
    });
}


        function loadGame(id) {
    db.ref("publishedGames/" + id).once("value", snapshot => {
        let encoded = snapshot.val().code;
        let code = atob(encoded);

        let doc = preview.contentDocument;
        doc.open();
        doc.write(code);
        doc.close();

        preview.style.display = "block";
    });
}

        loadPublishedGames();
    </script>

</body>
</html>
